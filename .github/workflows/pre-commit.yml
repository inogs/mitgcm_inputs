name: precommit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  precommit:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install mitgcm_inputs
        run: poetry install --with dev

      - name: Run precommit
        run: poetry run pre-commit run --show-diff-on-failure --color=always --all-files
